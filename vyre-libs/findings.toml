[[finding]]
id = "FINDING-GPU-11"
date_opened = "2026-06-21"
owner = "santhreal"
test = "vyre_driver_wgpu::tests::cat_a_gpu_differential::diff_universal_registry"
status = "open"
title = "region_inline flattens identically-named Region-scoped Let bindings into colliding siblings (fft_convolve_circular_complex fails V032 on the 5090)"
blocker = """
Surfaced 2026-06-21 by the universal GPU differential sweep on a live
RTX 5090: `vyre-libs::math::fft::fft_convolve_circular_complex` panics at
cat_a_gpu_differential.rs:74 (run_gpu .expect) with

  InvalidProgram { fix: "V032: duplicate sibling let binding
  `u_re_s1_b0_k0` in the same region. Fix: rename one binding or move one
  declaration into an inner Block/Region/Loop if a new scope is intended." }

Root cause is NOT in the FFT op itself. `fft_convolve_circular_complex`
(math/fft/convolution.rs) invokes `fft_region` THREE times (FFT(signal),
FFT(kernel), FFT(product)), each wrapping `fft_radix2_complex` in a
`Node::Region` specifically to SCOPE its Let bindings (see the comment at
convolution.rs:53-55). All three invocations use n=4, so the radix-2
butterfly (fft_radix2.rs:83-121) emits the IDENTICAL binding names
`{u,l,t}_{re,im}_s{stage}_b{block}_k{k}` in each. The CPU reference
interpreter honors the Region scope, so the op executes correctly there
(convolution.rs unit + adversarial tests all pass). But the GPU lowering
path runs `vyre_foundation::optimizer::pre_lowering::optimize`
(region_inline), which UNWRAPS the `Node::Region` wrappers into the parent
region WITHOUT alpha-renaming the inlined Let bindings — so the three FFTs'
`u_re_s1_b0_k0` (etc.) collapse into colliding siblings and V032 fires at
naga validation. Any op composed by inlining the same sub-op more than once
into one region hits this; FFT-convolve is just the first reproducer.
"""
fix_plan = """
CORRECT FIX (Law 4 — fix the architecture): make region_inline scope-safe.
When `pre_lowering`/region_inline unwraps a `Node::Region` whose Let
bindings would collide with names already live in the destination region,
alpha-rename the inlined region's bindings (and every Expr::var reference
within that region's subtree) to fresh unique names before splicing. This
preserves the Region-as-scope contract every composed op relies on and
fixes the whole class, not just FFT. Files: the region_inline pass in
vyre-foundation/src/optimizer/pre_lowering/ (+ a rename-on-inline helper).
LOCAL WORKAROUND (rejected here as a silent mask, Law 10): prefixing
fft_radix2 bindings with a per-invocation tag (e.g. the sanitized output
buffer name) would unblock FFT-convolve but leave every other twice-inlined
composition silently exposed — do not ship the workaround without the
general fix.
VERIFY: re-run `cargo test -p vyre-driver-wgpu --test cat_a_gpu_differential
--features math-linalg,math-scan diff_universal_registry` on a GPU host;
fft_convolve_circular_complex must leave the failures list, and the
convolution.rs reference tests must stay green (no numeric regression).
"""

[[finding]]
id = "FINDING-BOUNDARY-1"
date_opened = "2026-06-22"
owner = "santhreal"
test = "vyre_libs::tests::consumer_boundary::library_source_does_not_name_downstream_consumers"
status = "open"
title = "security/dataflow layer names the Weir bridge partner in public API, conflicting with the no-downstream-consumer-names contract"
blocker = """
consumer_boundary.rs asserts vyre-libs/src/**/*.rs contains none of the
forbidden consumer names {weir, surgec, gosan, keyhog}. The MATCHING/scan layer
violations (keyhog, in doc comments of resident_presence.rs, resident.rs,
bounded_ranges.rs, literal_set.rs, regex_dfa.rs) were genericized 2026-06-22 — a
reusable matching library should not name a specific consumer; that part now
satisfies the contract.

The remaining violations are NOT doc comments and NOT cleanly removable: the
security/ + dataflow/ layer names "weir" 113 times (and "surgec" once) as PUBLIC
API and architectural fact:
  - dataflow/mod.rs is explicitly "the Weir/Vyre bridge"; SharedFactHeader uses
    producer id "weir".
  - public struct fields: weir_fact_kind, weir_role, weir_mapping,
    weir_tuple_count, weir_finding_count.
  - a feature-gated `pub mod weir_ifds` integration + `weir_ifds_external_engine`
    feature.
So the security/dataflow layer is DESIGNED as a Weir bridge: Weir is a peer the
shared-fact schema interoperates with, not a downstream consumer in the same
sense keyhog is a downstream of the matching layer. The contract and the
architecture genuinely conflict here.
"""
fix_plan = """
DESIGN DECISION (not a mechanical fix):
(a) PREFERRED — scope the consumer_boundary contract to the layers where it is
    a true one-way boundary (scan/ matching, math/, nn/, the reusable primitive
    layers) and EXEMPT the security/dataflow bridge layer, which interoperates
    with Weir by explicit schema contract. Encode the exemption as an allowlist
    of (path-prefix) in consumer_boundary.rs with a comment explaining why the
    bridge layer is exempt, OR move the Weir-named fact-schema types behind a
    neutral `bridge`/`partner` naming with Weir as one configured producer-id
    string value rather than a compile-time symbol.
(b) ALTERNATIVE — rename every weir_* public field/symbol to a neutral
    `partner_*`/`bridge_*` scheme and carry "weir" only as a runtime producer-id
    string. This is a large breaking API change across security/dataflow and
    must be done with the downstream Weir bridge's buy-in.
Until decided, this test stays red on the weir/surgec API; the scan-layer
(keyhog) half is already satisfied.
"""

