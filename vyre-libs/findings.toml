   `TensorRefError` with a `Fix:`-prefixed message on zero length.
2. Keep the existing free function as the back-compat wrapper that
   panics with the actionable builder error.
3. Un-ignore `dot_zero_returns_actionable_error` once `n=0` is rejected.
"""

