schema_version = "1"
# P3.8  -  single source of truth for every #[ignore] in vyre-libs.
# LAW 9 rule: every ignored test carries a finding entry with
# date_opened, owner, blocker, and fix_plan. No floating ignores.

[[finding]]
id = "FINDING-LIBS-1"
date_opened = "2026-04-20"
owner = "santhreal"
test = "vyre_libs::harness::tests::all_registered_ops_pass_harness"
status = "fixed"
fixed_on = "2026-04-20"
title = "OpEntry fixtures for relu/dot/broadcast/fnv1a32/attention declare expected_output for ReadOnly buffers"
blocker = """
The existing `inventory::submit!(OpEntry { … })` entries in
src/math/dot.rs, src/math/broadcast.rs, src/nn/activation/relu.rs,
and src/crypto/fnv/fnv1a.rs define `expected_output` shapes that
include their ReadOnly input buffers in the expected bytes.

The reference interpreter only returns ReadWrite output buffers
(see vyre-reference::hashmap_interp::output_names logic), so the
harness's mismatch check reports divergence on every run. Per-op
byte-identity coverage lives in tests/cat_a_conform.rs which is
authoritative; the universal harness is ceremonial until fixtures
are rewritten to expect only RW buffer outputs.
"""
fix_plan = """
1. Walk each file under src/{math,nn,crypto}/*/ with an inventory::submit!
   call that sets expected_output.
2. Rewrite each closure to emit a `Vec<Vec<u8>>` containing only the
   RW output buffers in binding order.
3. Remove the #[ignore] from `all_registered_ops_pass_harness` and
   re-run the full suite.
"""

[[finding]]
