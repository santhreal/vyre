blocker = """
After FINDING-GPU-1, GPU-3, GPU-4 closed, dot fails at Naga
validation with `InvalidAtomic(InvalidPointer([22]))`. The dot
op writes to the output via `atomic_add` (so multiple
invocations of the workgroup accumulate into out[0]), and the
Naga emitter produces a pointer that Naga rejects as invalid
for atomic operations.

Either the dot op needs to declare `DataType::AtomicU32` (not
plain U32) on its output, or the Naga emitter needs to resolve
the pointer type differently for atomic stores.
"""
fix_plan = """
Decide: should dot use `DataType::AtomicU32` on its output
buffer? If yes: update vyre-libs/src/math/linalg/dot.rs and the
CPU ref interpreter's atomic semantics. If no: debug why Naga's
atomic store validation rejects the produced pointer.

Simpler alternative: rewrite dot to not use atomics  -  one
workgroup reduction into shared memory, then a single store.
"""

