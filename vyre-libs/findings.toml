test = "vyre_runtime::tests::adversarial_disk::corrupted_bin_file_rejected"
status = "fixed"
title = "DiskCache::get returns partially-written (torn) .bin files as valid hits"
blocker = """
Surfaced by Kimi 2026-04-20. A process that writes 500 bytes to
`root/<hex>.bin` then crashes (or a fsync-less write that loses
the tail) leaves a partial file. `DiskCache::get` reads that file
with `fs::read` and returns the partial bytes as a valid artifact.

At internet scale: one torn pipeline-cache blob = every consumer
that loads it hits corrupted SPIR-V / WGSL / native bytecode and
UB-dispatches on the GPU.
"""
fix_plan = """
Two-layer defense:

1. Length prefix + blake3 checksum in the on-disk format:
   `<8 bytes length LE><N bytes payload><32 bytes blake3(payload)>`.
   `get` validates checksum before returning.

2. put uses `write + fsync + rename` (atomic replace) so a crash
   mid-write leaves either the prior file or nothing, never a
   torn state. Currently put is `write + rename` which drops
   fsync  -  adding `tmp_file.sync_all()?` before rename closes
   this class of corruption on crash.
"""

