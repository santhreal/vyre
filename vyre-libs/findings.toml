loop-unroll/promote that only fires on the already-once-optimized form). So the
loop-promotion pass is not run to fixpoint within a single optimize() call — the
optimizer needs two passes to stabilize this program. Off the keyhog matching
lane (scallop/datalog join), but a real optimizer-contract violation: idempotence
is a stated harness invariant.
