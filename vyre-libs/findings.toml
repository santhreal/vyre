Revealed 2026-06-22 once the vyre-driver-cuda build breaks were fixed (the suite
had not compiled, so these never ran). 85 self_optimizer_* CUDA e2e tests fail with
ONE shared error from the CUDA resident dispatch:

  Dispatch(BackendError("Fix: CUDA resident dispatch expected 7 resident buffer
  handle(s) but received 3."))

emitted at vyre-driver-cuda/src/backend/dispatch.rs:229 (and the sibling resident
paths backend/resident_dispatch/{batch.rs:63, async_dispatch.rs:121, borrowed.rs:103}).
Call path: the tests call vyre_self_substrate::optimizer::pipeline_resident::
gpu_pipeline_resident(p, &CudaOptimizerDispatcher), which allocates resident handles
for the arena optimizer passes and dispatches. One pass's Program declares 7 buffers
but gpu_pipeline_resident provides only 3 resident handles -> hard contract violation.

NOT a CUDA-backend bug and NOT caused by the build-break fix: keyhog's own resident
consumer (ResidentPresencePipeline) passes the SAME dispatch path with the correct
handle count -- `resident_presence_cuda_parity::
resident_region_presence_matches_borrowed_and_planted_hits_on_cuda` is GREEN. So the
resident-dispatch contract works; the defect is in gpu_pipeline_resident's per-pass
handle wiring. Deterministic (all 85 hit it). Off keyhog's matching lane (self-hosted
