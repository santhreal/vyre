   loop-unroll / region_promote_singleton_block style cleanup pass) in
   vyre-foundation/src/optimizer/passes/cleanup/.
2. Either run the cleanup passes to a fixpoint within optimize() (iterate until
   no pass mutates), or make the trip-count-1 promotion fire on the first pass
   for this Loop shape (it is gated on some precondition only satisfied after the
   first pass mutates the surrounding region).
3. Re-run universal_harness; optimize(optimize(p)) must equal optimize(p) for
