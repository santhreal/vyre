title = "dot accepts an empty reduction instead of rejecting n=0"
blocker = """
`vyre-libs::math::dot` currently builds a program for `n=0` that stores the
additive identity into `out[0]`. The V7 boundary contract requires empty
reductions to fail loudly with an actionable `Fix:` diagnostic rather than
silently manufacturing a value for undefined input.
