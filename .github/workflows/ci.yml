name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  matrix:
    name: ${{ matrix.os }} / ${{ matrix.rust-toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust-toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "${{ matrix.rust-toolchain }}" \
            --profile minimal \
            --component clippy \
            --component rustfmt
          rustup default "${{ matrix.rust-toolchain }}"

      - name: cargo_full fmt
        shell: bash
        run: ./cargo_full fmt --check

      - name: abstraction gate
        shell: bash
        run: ./cargo_full run -p xtask -- abstraction-gate

      - name: cargo_full clippy (advisory)
        shell: bash
        continue-on-error: true
        run: ./cargo_full clippy --workspace

      - name: cargo_full test
        shell: bash
        run: ./cargo_full test --workspace

      - name: segmentation parity oracle (megakernel-batch, CPU)
        shell: bash
        # The GPU segmentation algorithm's CPU correctness oracle (dense vs
        # segmented Aho-Corasick scan, every-offset-owned-once, emit-range
        # tiling) lives behind the non-default `megakernel-batch` feature, so the
        # `--workspace` default-feature run above never compiles it. These are
        # pure-CPU tests; gate them directly here so a segmentation regression
        # fails the main PR check, not only the slower --all-features coverage job.
        run: ./cargo_full test -p vyre-driver-wgpu --features megakernel-batch --lib -- segment

      - name: self-substrate CPU-parity oracle tests (cpu-parity)
        shell: bash
        # vyre-self-substrate is `default = []`, so the `--workspace` default-feature
        # run above compiles NONE of its `cpu-parity`-gated tests, the CSR/graph CPU
        # oracle matrices AND the `_via` end-to-end reference-parity suites (which run
        # each production dispatch form through a reference-eval dispatcher against its
        # CPU oracle: do-calculus surgery, functor_apply, hypervector xor-bind, and the
        # Mori-Zwanzig fixed-point projection). Wire the specific integration binaries so
        # a substrate parity regression fails the main PR check, not only the slower
        # --all-features job. (Scoped to `--test` targets rather than `-p` so this step
        # is not coupled to unrelated `--lib` release-evidence state.)
        run: >-
          ./cargo_full test -p vyre-self-substrate --features cpu-parity
          --test sweep_graph_cpu_oracle_matrix
          --test do_calculus_surgery_via_reference_parity
          --test functor_apply_via_reference_parity
          --test vsa_fingerprint_via_reference_parity
          --test mz_project_via_reference_parity
          --test sheaf_spectrum_via_reference_parity
          --test vietoris_rips_via_reference_parity
          --test natural_gradient_via_reference_parity
          --test tensor_train_compress_via_reference_parity
          --test kfac_via_reference_parity
          --test sinkhorn_via_reference_parity
          --test matching_diagnostic_via_reference_parity
          --test quantized_via_reference_parity
          --test tensor_train_chain_fusion_via_reference_parity
          --test sheaf_heterophilic_via_reference_parity
          --test string_diagram_via_reference_parity
          --test planar_rewrite_via_reference_parity
          --test multigrid_matroid_via_reference_parity
          --test semiring_gemm_via_reference_parity
          --test bellman_shortest_path_via_reference_parity
          --test reduction_metrics_via_reference_parity
          --test bitset_mask_algebra_via_reference_parity
          --test bitset_summary_via_reference_parity
          --test scallop_provenance_via_reference_parity
          --test softmax_pick_config_via_reference_parity
          --test fmm_polyhedral_via_reference_parity
          --test natural_config_gradient_via_reference_parity
          --test cost_model_predict_runtime_via_reference_parity
          --test union_find_alias_via_reference_parity
          --test matroid_exact_subset_via_reference_parity
          --test submodular_retention_via_reference_parity
          --test fmm_compress_pairwise_via_reference_parity
          --test fusion_scores_via_reference_parity
          --test shape_spectrum_via_reference_parity
          --test smooth_latency_trace_via_reference_parity
          --test predict_impact_via_reference_parity
          --test transport_residual_via_reference_parity
          --test reconstruct_path_via_reference_parity
          --test match_motif_via_reference_parity
          --test smooth_matroid_flow_via_reference_parity

      - name: cargo_full doc
        shell: bash
        run: ./cargo_full doc --workspace

  release-evidence-shape:
    name: release evidence shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          MSRV="$(grep -E '^rust-version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          rustup toolchain install "$MSRV" --profile minimal
          rustup default "$MSRV"

      - name: Generate structural release evidence
        shell: bash
        run: ./cargo_full run --bin xtask -- release-evidence

      - uses: actions/upload-artifact@v4
        with:
          name: vyre-structural-release-evidence
          path: ./release/evidence/**/*.json
