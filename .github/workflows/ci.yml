name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  matrix:
    name: ${{ matrix.os }} / ${{ matrix.rust-toolchain }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust-toolchain: [stable, nightly]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          rustup toolchain install "${{ matrix.rust-toolchain }}" \
            --profile minimal \
            --component clippy \
            --component rustfmt
          rustup default "${{ matrix.rust-toolchain }}"

      - name: cargo_full fmt
        shell: bash
        run: ./cargo_full fmt --check

      - name: abstraction gate
        shell: bash
        run: ./cargo_full run -p xtask -- abstraction-gate

      - name: cargo_full clippy (advisory)
        shell: bash
        continue-on-error: true
        run: ./cargo_full clippy --workspace

      - name: cargo_full test
        shell: bash
        run: ./cargo_full test --workspace

      - name: segmentation parity oracle (megakernel-batch, CPU)
        shell: bash
        # The GPU segmentation algorithm's CPU correctness oracle (dense vs
        # segmented Aho-Corasick scan, every-offset-owned-once, emit-range
        # tiling) lives behind the non-default `megakernel-batch` feature, so the
        # `--workspace` default-feature run above never compiles it. These are
        # pure-CPU tests; gate them directly here so a segmentation regression
        # fails the main PR check, not only the slower --all-features coverage job.
        run: ./cargo_full test -p vyre-driver-wgpu --features megakernel-batch --lib -- segment

      - name: cargo_full doc
        shell: bash
        run: ./cargo_full doc --workspace

  release-evidence-shape:
    name: release evidence shape
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        shell: bash
        run: |
          MSRV="$(grep -E '^rust-version' Cargo.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          rustup toolchain install "$MSRV" --profile minimal
          rustup default "$MSRV"

      - name: Generate structural release evidence
        shell: bash
        run: ./cargo_full run --bin xtask -- release-evidence

      - uses: actions/upload-artifact@v4
        with:
          name: vyre-structural-release-evidence
          path: ./release/evidence/**/*.json
