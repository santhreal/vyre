authorization_policy = "authorized-owner-route-security-or-release-incident-id-and-two-person-review-required-for-release-critical-bypass"
expiry_policy = "time-bounded-single-purpose-exception-with-automatic-expiration-and-no-open-ended-namespace-exemption"
audit_policy = "Kubernetes-audit-event-policy-decision-user-groups-objectRef-reason-and-post-action-result-captured"
remediation_policy = "exception-must-end-with-policy-fix-resource-fix-or-rollback-forward-fix-decision-record"
privacy_boundary = "public-status-redacts-user-sensitive-detail-secrets-private-Santh-paths-and-exploit-reproducer-material"
