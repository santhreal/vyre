schema = "vyre.ops.admission_exception_breakglass_policy.v1"
owner = "coordination"
evidence_tokens = ["KUBERNETES_DYNAMIC_ADMISSION", "KUBERNETES_VALIDATING_ADMISSION_POLICY", "KUBERNETES_AUDITING", "FIRST_PSIRT_SERVICES_FRAMEWORK"]

required_fields = [
  "exception_id",
  "trigger_policy",
  "scope_policy",
  "authorization_policy",
  "expiry_policy",
  "audit_policy",
  "remediation_policy",
  "privacy_boundary",
  "release_gate_effect",
  "diagnostic",
]

