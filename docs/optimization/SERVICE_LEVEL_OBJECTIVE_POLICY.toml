diagnostic = "VYRE_SCAN_LATENCY_SLO_REQUIRED"

[[slo]]
slo_id = "diagnostic-actionability-slo"
service_surface = "operator-visible-errors-alerts-and-runbooks"
sli_query_policy = "actionable-diagnostic-count-over-total-error-count-from-structured-errors-and-alerts"
objective_policy = "operator-facing-failure-must-include-fix-text-owner-route-and-runbook-link"
window_policy = "evaluation-window-matches-release-health-feedback-window"
