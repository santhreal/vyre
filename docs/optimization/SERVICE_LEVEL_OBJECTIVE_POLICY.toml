window_policy = "window-declared-separately-from-benchmark-run-duration"
error_budget_policy = "latency-error-budget-burn-blocks-public-speed-claim-when-contradicted-by-operator-evidence"
recording_rule_policy = "recording-rule-precomputes-route-level-latency-with-no-path-or-secret-labels"
release_gate_effect = "invalidates-performance-release-claim-until-regression-triage-record-exists"
