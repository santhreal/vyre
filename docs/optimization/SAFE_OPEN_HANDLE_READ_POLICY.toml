[artifact]
id = "SAFE_OPEN_HANDLE_READ_POLICY"
title = "Safe open-to-read handle policy"
tranche = "VX-1521..VX-1540"
owner = "security_reliability"
status = "planned_contract"
research_sources = [
  "LINUX_OPENAT2",
  "LINUX_STATX",
  "LINUX_READV_PREADV2",
  "LINUX_OPEN_DIRECT_IO",
  "LINUX_IO_URING_REGISTER",
]

[scope]
owns = [
  "dirfd-relative open admission before read scheduling",
  "resolve-constraint evidence for handle creation",
  "open-handle metadata recheck before byte reads",
  "direct-I/O flag and alignment decision recording",
  "handle lifetime across async completion drains",
]
does_not_own = [
  "global path canonicalization, owned by FILESYSTEM_PATH_CANONICALIZATION_POLICY",
  "filesystem race taxonomy, owned by ATOMIC_FILE_OPERATION_RACE_POLICY",
  "evidence redaction policy, owned by FILESYSTEM_EVIDENCE_REDACTION",
  "read buffer residency, owned by MEMORY_RESIDENCY_TIER_CONTRACTS",
]

[open_contract]
root_binding = "all scan candidates are opened relative to an audited directory handle or rejected before read submission"
resolve_constraints = ["no_magiclink_escape", "no_mount_escape_without_policy", "no_symlink_escape_without_policy", "beneath_audited_root"]
flags = ["read_only", "close_on_exec", "nonblocking_when_supported", "direct_io_when_alignment_proven"]
identity_recheck = "after open, stat evidence is compared against candidate metadata before any byte range is submitted"
unsupported_platform = "platforms without equivalent safe-open semantics must use a stricter existing filesystem boundary and record capability absence"

[read_contract]
positioning = "positioned reads: every read is submitted with an explicit offset (preadv2-style); the shared descriptor file position is never used for parallel ingestion"
byte_range_identity = "every request records file handle id, offset, length, expected file size snapshot, and destination buffer id"
retry_policy = "retry handles interruption and short reads within configured budget; repeated identity drift or permission drift fails closed"
direct_io_policy = "direct I/O is admitted only when offset, length, and buffer alignment satisfy recorded filesystem and device constraints"
zero_length_policy = "zero-byte regular files produce a terminal empty-file scan event without allocating read buffers"

[close_contract]
completion_drain = "a handle cannot close while queued reads reference it"
failed_open = "failed opens produce a structured finding with errno class, candidate identity, and operator fix"
failed_read = "failed reads preserve partial-progress evidence without sending incomplete bytes to the scanner"
resource_cleanup = "registered handles are unregistered before descriptor close when io_uring registration is active"
