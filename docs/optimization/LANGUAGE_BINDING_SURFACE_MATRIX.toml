# Language binding surface matrix for VX-1202, VX-1207, VX-1215, and VX-1217.
# C ABI libraries, Python wheels, Node-API addons, and WebAssembly components share one binding surface map.

schema = "vyre.release.language_binding_surface_matrix.v1"
owner = "organization_dedup"
evidence_tokens = ["RUST_REFERENCE_LINKAGE", "RUST_NOMICON_FFI", "PYO3_USER_GUIDE", "NODE_API_ABI", "WEBASSEMBLY_COMPONENT_MODEL"]

required_fields = [
  "binding_id",
  "language_surface",
  "crate_boundary",
  "artifact_form",
  "ffi_or_component_policy",
  "packaging_policy",
  "semver_policy",
  "verification_policy",
  "private_boundary_policy",
  "diagnostic",
]

