[artifact]
id = "FILE_INGRESS_ASYNC_IO_PIPELINE"
title = "File ingress async I/O pipeline contract"
tranche = "VX-1521..VX-1540"
owner = "runtime_io"
status = "planned_contract"
research_sources = [
  "LINUX_IO_URING_SETUP",
  "LINUX_IO_URING_ENTER",
  "LINUX_IO_URING_REGISTER",
  "LINUX_READV_PREADV2",
  "LINUX_OPEN_DIRECT_IO",
]

[scope]
owns = [
  "async file-read submission and completion queue contracts",
  "fixed-file and fixed-buffer registration admission rules",
  "read chunk sizing, offset stability, and partial-read retry accounting",
  "direct-I/O admission and buffered-read downgrade behavior",
  "ingress queue depth limits before scan engine handoff",
]
does_not_own = [
  "path traversal and archive extraction policy, owned by FILESYSTEM_ARCHIVE_GOVERNANCE_TRANCHE_COVERAGE",
  "GPU-direct corpus paging capability, owned by GPU_DIRECT_CORPUS_PAGING_CAPABILITIES",
  "memory residency tier placement, owned by MEMORY_RESIDENCY_TIER_CONTRACTS",
  "transfer overlap after staging, owned by TRANSFER_OVERLAP_PIPELINE_EVIDENCE",
  "operator-visible backpressure quotas, owned by BACKPRESSURE_QUEUE_QUOTA_POLICY",
]

[queue_contract]
submission_ring = "created from explicit Tier A queue-depth and sqpoll policy"
completion_ring = "drained until every submitted read has terminal success, retry, cancellation, or fail-closed state"
registration = "fixed buffers and fixed files are allowed only after capability and lifetime evidence is attached to the ingestion batch"
partial_read_policy = "positioned reads preserve target offset and retry only the missing byte range within the same budget envelope"
completion_identity = "every completion maps to corpus file id, inode/device snapshot, byte range, buffer slot, and downstream scan batch id"

[read_admission]
chunk_size_source = "Tier A default plus TOML override; CLI may tighten but not exceed resource-budget ceilings"
positioning = "preadv2-style positioned reads are preferred for offset-stable chunking; stream-position reads are rejected for parallel chunk queues"
direct_io = "direct I/O requires filesystem support plus alignment evidence for file offset, length, and destination buffer"
buffered_io = "buffered reads remain the safe downgrade path when direct-I/O evidence is absent or invalid"
mmap_boundary = "mmap is a separate corpus paging strategy and must not be silently substituted inside this async-read contract"

[lifetime_and_safety]
handle_lifetime = "open file descriptors remain live until all queued reads against them reach terminal completion"
buffer_lifetime = "registered buffers remain exclusive to the ingress pipeline until completion ownership transfers to scan staging"
metadata_freshness = "scan admission records the statx snapshot used for size, mode, inode, device, mtime, and birthtime if available"
error_context = "read failures include path alias id, stable handle id, byte range, errno class, retry decision, and operator fix"
secret_handling = "paths and snippets follow FILESYSTEM_EVIDENCE_REDACTION before public evidence is written"

[downstream_handoff]
scan_engine_contract = "only complete byte ranges with stable file identity enter the scanner"
memory_contract = "buffer ownership transfers through MEMORY_RESIDENCY_TIER_CONTRACTS and PINNED_STAGING_TRANSFER_POLICY when GPU staging is used"
telemetry_contract = "latency, bytes, queue occupancy, syscall count, retry count, and amplification are exposed to profiling and statistical gates"
