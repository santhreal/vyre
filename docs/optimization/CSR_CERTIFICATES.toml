# CSR certificates for VX-667.
# Traversal and flow cannot consume offset/target arrays without shape and ownership proof.

schema = "vyre.graph.csr_certificate.v1"
owner = "graph_flow_compiler"
evidence_tokens = ["GUNROCK", "CUGRAPH"]

required_fields = [
  "graph_id",
  "offset_monotonicity",
  "target_bounds",
  "duplicate_policy",
  "sort_policy",
  "reverse_edge_status",
  "owner_lane",
  "diagnostic",
]

[[certificate]]
graph_id = "valid-sorted-csr"
offset_monotonicity = "monotonic"
target_bounds = "within-node-count"
duplicate_policy = "deduplicated"
sort_policy = "sorted-by-target"
reverse_edge_status = "present"
owner_lane = "graph-traversal"
diagnostic = "none"

[[certificate]]
graph_id = "unsorted-duplicate-csr"
offset_monotonicity = "monotonic"
target_bounds = "within-node-count"
duplicate_policy = "duplicates-present"
sort_policy = "unsorted"
reverse_edge_status = "missing"
owner_lane = "fuzzing"
diagnostic = "VYRE_CSR_UNSORTED_DUPLICATE_MISSING_REVERSE"
