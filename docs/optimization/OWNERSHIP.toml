  "vyre-driver-wgpu/src/**",
  "vyre-driver-metal/src/**",
  "vyre-libs/src/**",
]
required_commands = [
  "cargo_full test -p xtask",
]

[lane.compiler_optimizer]
purpose = "Compiler optimizer seam: IR passes, descriptor rewrites, encoded optimizer relations, pass traces, specialization cost models, and emitter validation phases."
layer = "Compiler optimizer seam"
write = [
  "vyre-foundation/src/optimizer/**",
  "vyre-foundation/src/transform/**",
  "vyre-lower/src/**",
  "vyre-emit-naga/src/**",
  "vyre-emit-ptx/src/**",
  "vyre-emit-spirv/src/**",
  "vyre-emit-metal/src/**",
  "vyre-self-substrate/src/optimizer/**",
  "vyre-driver/src/specialization.rs",
  "vyre-driver/src/launch_fusion.rs",
]
avoid = [
  "vyre-libs/src/parsing/**",
  "vyre-libs/src/security/**",
  "release/evidence/**",
]
required_commands = [
  "cargo_full test -p vyre-foundation optimizer",
  "cargo_full test -p vyre-lower -p vyre-emit-naga -p vyre-emit-ptx -p vyre-emit-spirv -p vyre-emit-metal",
]

[lane.evidence_truth]
purpose = "Evidence truth seam: benchmark semantics, release gates, launch evidence, docs claims, matrix schemas, generated artifacts, and duplicate-detection reports."
layer = "Evidence truth"
write = [
  "release/evidence/**",
  "docs/optimization/**",
  "scripts/final-launch.sh",
  "scripts/lib/repo_boundary.sh",
  "scripts/lib/release_train.sh",
  "scripts/lib/toml_reader.sh",
  "scripts/publish-release.sh",
  "vyre-bench/src/cases/**",
]
avoid = [
  "vyre-driver-cuda/src/backend/**",
  "vyre-driver-wgpu/src/backend_impl.rs",
  "vyre-libs/src/parsing/**",
  "vyre-libs/src/security/**",
]
required_commands = [
  "cargo_full test -p xtask",
  "cargo_full check -p vyre-bench",
]

[lane.product_dogfood]
purpose = "Product dogfood seam: public examples, benchmark dashboards, API task maps, positioning matrices, AOT evidence packages, and consumer compatibility reports."
layer = "Product/dogfood"
write = [
  "README.md",
  "docs/**",
  "examples/**",
  "vyre-debug/src/**",
  "vyre-aot/src/**",
  "vyre-bench/src/**",
  "vyre-core/src/lib.rs",
  "vyre-lints/src/**",
]
avoid = [
  "vyre-driver-cuda/src/backend/**",
  "vyre-runtime/src/megakernel/**",
  "release/evidence/final/**",
]
required_commands = [
  "cargo_full check -p vyre-core -p vyre-debug -p vyre-aot -p vyre-bench -p vyre-lints",
]

[lane.op_matrix]
purpose = "Op/backend coverage tracking, tier placement, parity status."
layer = "Coordination"
parent_axis = "coordination"
support_reason = "Op/backend coverage files support coordination evidence and are not a separate implementation axis."
write = [
  "docs/optimization/OP_MATRIX.toml",
  "docs/catalog/**",
  "docs/generated/**",
]
required_commands = [
  "cargo_full check -p vyre-foundation -p vyre-primitives -p vyre-intrinsics -p vyre-libs",
]
