# Completion audit evidence matrix for VX-997 through VX-1000.
# Completion is blocked until every explicit requirement has direct current-state evidence.

schema = "vyre.release.completion_audit_evidence_matrix.v1"
owner = "coordination"
evidence_tokens = ["GITHUB_ACTIONS_WORKFLOW", "SLSA_PROVENANCE", "OPENSSF_SECURITY_INSIGHTS"]

required_fields = [
  "requirement_id",
  "scope",
  "authoritative_evidence",
  "evidence_status",
  "completion_decision",
  "blocker_if_unverified",
  "publication_boundary",
  "proof_gate",
]

[[requirement]]
requirement_id = "all-vx-rows-have-registries-and-proof-gates"
scope = "ALL_AXES_ACCELERATION_PLAN.md"
