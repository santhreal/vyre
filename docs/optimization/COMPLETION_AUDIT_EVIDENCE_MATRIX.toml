evidence_status = "requires-explicit-audit"
completion_decision = "not-complete-until-audit-passes"
blocker_if_unverified = true
publication_boundary = "PUBLICATION_BOUNDARY_MANIFEST.toml"
proof_gate = "release_completion_governance.rs"

[[requirement]]
