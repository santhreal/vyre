# SIMD structural source indexing for VX-652.
# The prepass is shared by parser, lexer, and batch scan planning.

schema = "vyre.parser.structural_index.v1"
owner = "parser_frontend"
evidence_tokens = ["SIMDJSON_PARSE_MANY", "TREE_SITTER"]

required_boundaries = [
  "brace_open",
  "brace_close",
  "paren_open",
  "paren_close",
  "bracket_open",
  "bracket_close",
  "line_comment",
  "block_comment",
  "string_literal",
  "raw_string_literal",
]

required_metrics = [
  "source_digest",
  "structural_index_digest",
  "chunk_id",
  "byte_start",
  "byte_end",
  "boundary_safety",
  "parse_reuse_evidence",
  "preparse_cost_ns",
]

