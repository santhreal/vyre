# Secret material handling policy for VX-881 through VX-883 and VX-893 through VX-894.
# Credentials, tokens, keys, env vars, logs, reports, and evidence use one secret lifecycle contract.

schema = "vyre.crypto.secret_material_handling_policy.v1"
owner = "security_reliability"
evidence_tokens = ["OWASP_SECRETS_MANAGEMENT", "NIST_SP_800_57"]

required_fields = [
  "secret_class",
  "source_boundary",
  "storage_boundary",
  "access_policy",
  "logging_policy",
  "redaction_policy",
  "rotation_policy",
  "incident_policy",
  "diagnostic",
]

[[secret]]
secret_class = "operator-credential-env"
source_boundary = "credentials-env-file-or-process-env"
storage_boundary = "never-persist-in-repo-or-public-artifact"
access_policy = "read-at-boundary-and-pass-opaque-handle"
logging_policy = "never-log-value"
redaction_policy = "redact-secret-like-values-and-env-names-when-sensitive"
rotation_policy = "operator-owned-rotation-with-stale-secret-diagnostic"
incident_policy = "quarantine-evidence-and-force-redaction-review"
diagnostic = "VYRE_SECRET_MATERIAL_PUBLICATION_REFUSED"

[[secret]]
secret_class = "release-signing-key-reference"
source_boundary = "external-key-provider-reference"
storage_boundary = "key-material-not-stored-by-vyre"
access_policy = "signing-operation-only"
logging_policy = "log-key-id-not-secret-material"
redaction_policy = "redact-provider-specific-secret-paths"
rotation_policy = "key-id-versioned-and-expiry-recorded"
incident_policy = "revoke-key-reference-and-block-release"
diagnostic = "VYRE_SECRET_SIGNING_KEY_POLICY_REFUSED"
