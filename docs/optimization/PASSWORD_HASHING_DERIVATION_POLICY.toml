# Password hashing and derivation policy for VX-891 through VX-892.
# Password-derived secrets use memory-hard hashing, salt records, parameter floors, and migration diagnostics.

schema = "vyre.crypto.password_hashing_derivation_policy.v1"
owner = "security_reliability"
evidence_tokens = ["RFC_9106_ARGON2", "OWASP_CRYPTO_STORAGE", "OWASP_SECRETS_MANAGEMENT"]

required_fields = [
  "derivation_id",
  "algorithm",
  "salt_policy",
  "parameter_floor",
  "pepper_policy",
  "storage_policy",
  "migration_policy",
  "diagnostic",
]

[[derivation]]
derivation_id = "operator-local-cache-password"
algorithm = "argon2id"
salt_policy = "unique-random-salt-per-secret"
parameter_floor = "memory-hard-policy-floor"
pepper_policy = "external-secret-provider-if-used"
storage_policy = "store-parameters-salt-and-hash-not-password"
migration_policy = "rehash-on-policy-upgrade"
diagnostic = "VYRE_PASSWORD_HASH_POLICY_REFUSED"

[[derivation]]
derivation_id = "test-fixture-password-hash"
algorithm = "argon2id"
salt_policy = "synthetic-fixed-test-salt-only-in-test-fixtures"
parameter_floor = "reduced-test-cost-marked-nonproduction"
pepper_policy = "not-used-in-test-fixture"
storage_policy = "test-fixture-only"
migration_policy = "cannot-be-used-for-production-config"
diagnostic = "VYRE_PASSWORD_HASH_TEST_FIXTURE_USED_IN_RELEASE"
