  "resolution contracts cover resolved, unresolved, ambiguous, dynamic, and cycle states",
  "propagation policy contains positive, negative, adversarial, and cross-file truth requirements",
  "reuse evidence records false reuse, unresolved edges, ambiguous edges, and bytes avoided",
  "the plan contains VX-1561 through VX-1580 rows",
]
