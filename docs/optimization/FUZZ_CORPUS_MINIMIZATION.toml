# Fuzz corpus and minimization contracts for VX-744 through VX-746.
# Seeds, reducers, structured mutators, and differential lanes share one schema.

schema = "vyre.fuzz.corpus_minimization.v1"
owner = "security_reliability"
evidence_tokens = ["LLVM_LIBFUZZER", "AFLPLUSPLUS", "CARGO_FUZZ"]

required_fields = [
  "corpus_id",
  "seed_source",
  "seed_digest",
  "minimizer",
  "structured_mutator",
  "differential_lanes",
  "reduced_input_digest",
  "owner_lane",
]

structured_mutators = [
  "toml_registry",
  "regex_pattern",
  "source_dialect_envelope",
  "csr_graph",
  "wire_format",
]

[[corpus]]
corpus_id = "scan-wire-regression-corpus"
seed_source = "checked-in-fixtures"
seed_digest = "sha256:scan-wire-seeds"
minimizer = "libfuzzer-merge-and-minimize"
structured_mutator = "wire_format"
differential_lanes = ["cpu-decoder", "gpu-eligibility-refuser"]
reduced_input_digest = "sha256:scan-wire-minimized"
owner_lane = "security_reliability"

[[corpus]]
corpus_id = "frontend-recovery-corpus"
seed_source = "parser-recovery-corpus"
seed_digest = "sha256:frontend-recovery-seeds"
minimizer = "afl-cmin-compatible"
structured_mutator = "source_dialect_envelope"
differential_lanes = ["tree-sitter-recovery", "vyre-frontend-recovery"]
reduced_input_digest = "sha256:frontend-recovery-minimized"
owner_lane = "parser_frontend"
