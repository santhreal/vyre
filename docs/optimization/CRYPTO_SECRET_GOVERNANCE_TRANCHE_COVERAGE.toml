# Crypto and secret governance tranche coverage for VX-881 through VX-900.
# Secret handling, RNG/key lifecycle, constant-time checks, password hashing, redaction, and publication boundaries share one coverage row.

schema = "vyre.plan.crypto_secret_governance_tranche_coverage.v1"
owner = "coordination"
evidence_tokens = ["NIST_SP_800_57", "NIST_SP_800_90A", "OWASP_SECRETS_MANAGEMENT", "OWASP_CRYPTO_STORAGE", "RFC_9106_ARGON2", "RFC_8446_TLS13", "OWASP_ASVS_CRYPTO"]

required_fields = [
  "vx_id_range",
  "secret_material_policy",
  "crypto_rng_key_lifecycle",
  "constant_time_contracts",
  "password_hashing_derivation_policy",
  "source_ledger_coverage",
  "publication_boundary",
  "dedup_seam",
  "proof_gate",
]

[[coverage]]
vx_id_range = "VX-881..VX-900"
secret_material_policy = "SECRET_MATERIAL_HANDLING_POLICY.toml"
crypto_rng_key_lifecycle = "CRYPTO_RNG_KEY_LIFECYCLE.toml"
constant_time_contracts = "CONSTANT_TIME_CRYPTO_CONTRACTS.toml"
password_hashing_derivation_policy = "PASSWORD_HASHING_DERIVATION_POLICY.toml"
source_ledger_coverage = "RESEARCH_SOURCE_LEDGER.toml"
publication_boundary = "PUBLICATION_BOUNDARY_MANIFEST.toml"
dedup_seam = "one-secret-policy-one-rng-key-lifecycle-one-constant-time-contract-one-password-hashing-policy"
proof_gate = "crypto_secret_governance.rs"
