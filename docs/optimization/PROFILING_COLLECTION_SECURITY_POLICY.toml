# Profiling collection owns sampling authority, privilege boundaries, overhead budgets, and profile storage safety; deployment and admission policies own runtime enforcement.

schema = "vyre.observability.profiling_collection_security.v1"
owner = "performance_observability"
evidence_tokens = ["LINUX_PERF_SECURITY", "PYROSCOPE_CLIENT_COLLECTION", "GRAFANA_PYROSCOPE", "KUBERNETES_ADMISSION_CONTROLLERS", "KUBERNETES_AUDITING"]

required_fields = [
  "collector_id",
  "collection_mode",
  "target_surface",
  "privilege_policy",
  "sampling_policy",
  "overhead_budget_policy",
  "cardinality_policy",
  "storage_policy",
  "network_policy",
  "redaction_policy",
  "failure_policy",
  "authority_links",
  "diagnostic",
]

