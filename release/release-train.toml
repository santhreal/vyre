# Release-train-level fields (required_*, package_verify_passed) must sit ABOVE
# the first [table] header: in TOML a bare key after `[tags]` binds INTO `[tags]`,
# which silently dropped them from `ReleaseTrainData` (xtask/src/release_train.rs
# expects them at top level) and made `xtask version-matrix` fail to parse this
# file ("missing field required_release_note_tokens"). Keep them here at top level.
required_release_note_tokens = [
  "vyre 0.6.2",
  "vyre-driver-cuda@0.6.2",
  "vyre-driver-wgpu@0.6.2",
  "vyre-v0.6.2-rc.1",
  "vyre-v0.6.2",
]

required_packaging_steps = [
  "package versions align before tag creation",
  "release candidate tags are cut before final tags",
  "release notes cite the product-scoped tags",
  "release artifacts are generated after the version matrix has zero blockers",
]

package_verify_passed = [
  "vyre-macros@0.6.2",
  "vyre-spec@0.6.2",
  "vyre-lints@0.6.2",
]

[versions]
vyre = "0.6.2"
vyrec = "0.1.0"
vyrec_train = "0.1.0-beta"
vyre_frontend_c = "0.6.2"

[tags]
vyre_rc = "vyre-v0.6.2-rc.1"
vyre = "vyre-v0.6.2"
policy = "Release packaging must use explicit product-scoped RC and final tags, not a bare v0.6.2 tag that could ambiguously refer to the root monorepo or Vyre crates."
